{% with pfx=gallery_id|default:'gallery' %}{% with thumb_cls=thumb_class|default:'gallery-thumb' %}
<!-- Gallery Lightbox: {{ pfx }} -->
<div id="{{ pfx }}-lightbox" role="dialog" aria-modal="true" aria-label="Image viewer" aria-hidden="true" class="hidden fixed inset-0 z-50 items-center justify-center bg-black/90">
  <div class="relative flex items-center justify-center w-full max-w-5xl px-16 mx-auto">
    <!-- Close button -->
    <button id="{{ pfx }}-close" type="button" aria-label="Close image viewer" class="absolute top-0 right-0 -translate-y-10 text-white text-4xl leading-none hover:text-gray-300 focus:outline-none">
      &times;
    </button>
    <!-- Prev button -->
    <button id="{{ pfx }}-prev" type="button" aria-label="Previous image" class="absolute left-0 text-white text-6xl leading-none hover:text-gray-300 focus:outline-none select-none px-2">
      &#8249;
    </button>
    <!-- Image (regular photos) -->
    <img id="{{ pfx }}-img" src="" alt="Collectible photo" class="max-h-[90vh] max-w-full rounded-lg shadow-xl object-contain">
    <!-- Embed frame (Getty and other HTML embeds) -->
    <iframe id="{{ pfx }}-embed-frame" src="about:blank" frameborder="0" allowfullscreen
      class="hidden rounded-lg shadow-xl bg-black"
      style="width:min(800px,calc(100vw - 8rem));height:min(800px,80vh);"></iframe>
    <!-- Next button -->
    <button id="{{ pfx }}-next" type="button" aria-label="Next image" class="absolute right-0 text-white text-6xl leading-none hover:text-gray-300 focus:outline-none select-none px-2">
      &#8250;
    </button>
    <!-- Counter -->
    <span id="{{ pfx }}-counter" class="absolute bottom-0 translate-y-8 text-white text-sm"></span>
  </div>
</div>
<script>
(function () {
  const lightbox    = document.getElementById('{{ pfx }}-lightbox');
  const img         = document.getElementById('{{ pfx }}-img');
  const embedFrame  = document.getElementById('{{ pfx }}-embed-frame');
  const counter     = document.getElementById('{{ pfx }}-counter');
  const prevBtn     = document.getElementById('{{ pfx }}-prev');
  const nextBtn     = document.getElementById('{{ pfx }}-next');
  const thumbClass  = '{{ thumb_cls }}';
  let items  = [];   // [{src, embed}]
  let current = 0;

  function show(index) {
    current = ((index % items.length) + items.length) % items.length;
    var item = items[current];
    counter.textContent = items.length > 1 ? (current + 1) + ' / ' + items.length : '';
    prevBtn.style.display = items.length > 1 ? '' : 'none';
    nextBtn.style.display = items.length > 1 ? '' : 'none';

    if (item.embed) {
      img.classList.add('hidden');
      embedFrame.classList.remove('hidden');
      embedFrame.srcdoc = '<!doctype html><html><head><style>'
        + 'html,body{margin:0;padding:0;width:100%;height:100%;background:#000;}'
        + 'body{display:flex;align-items:center;justify-content:center;}'
        + 'body iframe{width:100%!important;height:100%!important;}'
        + '</style></head><body>' + item.embed + '</body></html>';
    } else {
      embedFrame.classList.add('hidden');
      embedFrame.src = 'about:blank';
      embedFrame.removeAttribute('srcdoc');
      img.classList.remove('hidden');
      img.src = item.src;
    }
  }

  function open(index) {
    lightbox.classList.remove('hidden');
    lightbox.classList.add('flex');
    lightbox.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
    show(index);
  }

  function close() {
    lightbox.classList.add('hidden');
    lightbox.classList.remove('flex');
    lightbox.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
    embedFrame.src = 'about:blank';
    embedFrame.removeAttribute('srcdoc');
  }

  document.addEventListener('DOMContentLoaded', function () {
    items = Array.from(document.querySelectorAll('.' + thumbClass)).map(function (b) {
      return { src: b.dataset.gallerySrc || '', embed: b.dataset.galleryEmbed || '' };
    });

    document.querySelectorAll('.' + thumbClass).forEach(function (btn, i) {
      btn.addEventListener('click', function () { open(i); });
    });

    prevBtn.addEventListener('click', function () { show(current - 1); });
    nextBtn.addEventListener('click', function () { show(current + 1); });
    document.getElementById('{{ pfx }}-close').addEventListener('click', close);

    lightbox.addEventListener('click', function (e) {
      if (e.target === lightbox) close();
    });

    document.addEventListener('keydown', function (e) {
      if (lightbox.classList.contains('hidden')) return;
      if (e.key === 'ArrowLeft') show(current - 1);
      else if (e.key === 'ArrowRight') show(current + 1);
      else if (e.key === 'Escape') close();
    });
  });
}());
</script>
{% endwith %}{% endwith %}
