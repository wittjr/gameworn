<!-- ZIP export modal — include with export_url variable set -->
<div id="zip-modal" tabindex="-1" aria-hidden="true"
     class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full">
    <div class="relative p-4 w-full max-w-md max-h-full">
        <div class="relative bg-white rounded-lg shadow dark:bg-gray-700">
            <!-- Header -->
            <div class="flex items-center justify-between p-4 md:p-5 border-b rounded-t dark:border-gray-600">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Export Backup</h3>
                <button type="button" data-modal-hide="zip-modal"
                        class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white">
                    <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                    </svg>
                    <span class="sr-only">Close modal</span>
                </button>
            </div>
            <!-- Body -->
            <div class="p-4 md:p-5">
                <p class="text-sm text-gray-600 dark:text-gray-400 mb-4">
                    The ZIP file contains all collectible data as CSV plus any uploaded images.
                </p>
                <div class="flex items-center mb-5">
                    <input id="zip-include-external" type="checkbox"
                           class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
                    <label for="zip-include-external" class="ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">
                        Download external images
                    </label>
                </div>
                <a id="zip-download-link" href="{{ export_url }}" data-modal-hide="zip-modal"
                   class="btn-primary w-full text-center">Download</a>
            </div>
        </div>
    </div>
</div>

<script>
(function () {
    document.addEventListener('DOMContentLoaded', function () {
        var checkbox = document.getElementById('zip-include-external');
        var link = document.getElementById('zip-download-link');
        if (!checkbox || !link) return;
        var base = link.getAttribute('href');
        checkbox.addEventListener('change', function () {
            link.href = base + (this.checked ? '?include_external=1' : '');
        });
    });
})();
</script>
