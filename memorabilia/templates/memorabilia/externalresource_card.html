<div class="group relative h-full flex flex-col bg-white dark:bg-gray-800 rounded-lg shadow-sm border border-gray-200 dark:border-gray-700 hover:shadow-md hover:border-blue-300 dark:hover:border-blue-600 transition-all duration-200 overflow-hidden">
    <div class="p-5 flex-1 flex flex-col">
        <div class="flex items-start mb-3">
            <div class="flex-shrink-0 flex items-center justify-center w-10 h-10 rounded-full bg-blue-50 dark:bg-blue-900/40 text-blue-500 dark:text-blue-400">
                <i class="fas fa-globe text-base" aria-hidden="true"></i>
            </div>
            <h3 class="ml-3 min-w-0 text-base font-semibold leading-snug text-gray-900 dark:text-white group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">
                {{ resource.title }}
            </h3>
            {% if resource.link %}
            <i class="fas fa-external-link-alt ml-auto pl-3 text-xs text-gray-300 dark:text-gray-600 group-hover:text-blue-400 dark:group-hover:text-blue-500 transition-colors flex-shrink-0" aria-hidden="true"></i>
            {% endif %}
        </div>

        {% if resource.description %}
        <p class="text-sm text-gray-600 dark:text-gray-300 flex-grow leading-relaxed">
            {{ resource.description }}
        </p>
        {% else %}
        <div class="flex-grow"></div>
        {% endif %}

        {% if resource.link %}
        <a href="{{ resource.link }}"
           target="_blank"
           rel="noopener noreferrer"
           class="after:absolute after:inset-0 after:content-['']">
            <span class="sr-only">{{ resource.title }} (opens in new tab)</span>
        </a>
        {% endif %}
    </div>
</div>
